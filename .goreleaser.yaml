version: 2
project_name: 7geese-cli
changelog:
  disable: true
builds:
  - id: 7geese-cli
    main: ./cmd/7geese-pp-cli
    binary: 7geese-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X 7geese-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
homebrew:
  - name: 7geese-cli
    repository:
      owner: ekininceleme
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/ekininceleme/7geese-cli"
    description: "Export your 7Geese performance data — objectives, 1:1s, recognition, and reviews — as JSON."
    install: |
      bin.install "7geese-cli"
