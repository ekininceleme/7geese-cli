name: 7geese
display_name: 7Geese
description: Performance management CLI — OKRs, check-ins, 1:1s, recognition, and performance cycles from the terminal
base_url: https://app.7geese.com
version: v1

auth:
  type: cookie
  cookie_name: sgsession4
  env_vars:
    - SEVENGEESE_SESSION

pagination:
  type: offset
  param_limit: limit
  param_offset: offset
  response_key_objects: objects
  response_key_meta: meta
  default_limit: 20
  max_limit: 500

resources:
  objectives:
    description: Personal OKRs and goals
    endpoints:
      list:
        method: GET
        path: /api/v1/objectives/
        params:
          - name: limit
            type: integer
            description: Number of results (default 20)
          - name: offset
            type: integer
            description: Pagination offset
          - name: objective_type
            type: string
            description: "Filter by type: personal, team, org"
          - name: closed
            type: boolean
            description: Filter closed objectives
      get:
        method: GET
        path: /api/v1/objectives/{id}/
        no_auth: false
      create:
        method: POST
        path: /api/v1/objectives/
        body:
          - name: name
            type: string
            required: true
          - name: description
            type: string
          - name: objective_type
            type: string
            description: "personal, team, or org"
          - name: due_date
            type: string
            description: ISO 8601 date
          - name: start_date
            type: string
          - name: measurement_type
            type: string
            description: "percent, number, boolean"
          - name: starting_value
            type: number
          - name: target_value
            type: number
      update:
        method: PATCH
        path: /api/v1/objectives/{id}/
        body:
          - name: name
            type: string
          - name: description
            type: string
          - name: progress
            type: number
            description: Progress value (0-100 for percent type)
          - name: closed
            type: boolean
      delete:
        method: DELETE
        path: /api/v1/objectives/{id}/

  objectivekeyresults:
    description: Key results belonging to objectives
    endpoints:
      list:
        method: GET
        path: /api/v1/objectivekeyresults/
        params:
          - name: objective
            type: string
            description: Filter by objective resource URI
          - name: limit
            type: integer
          - name: offset
            type: integer
      get:
        method: GET
        path: /api/v1/objectivekeyresults/{id}/
      create:
        method: POST
        path: /api/v1/objectivekeyresults/
        body:
          - name: name
            type: string
            required: true
          - name: objective
            type: string
            required: true
            description: Resource URI of parent objective
          - name: measurement_type
            type: string
          - name: starting_value
            type: number
          - name: target_value
            type: number
      update:
        method: PATCH
        path: /api/v1/objectivekeyresults/{id}/
        body:
          - name: current_value
            type: number
            description: Update progress on this key result
          - name: name
            type: string

  checkins:
    description: Weekly check-ins on goals and progress
    endpoints:
      list:
        method: GET
        path: /api/v1/checkins/
        params:
          - name: limit
            type: integer
          - name: offset
            type: integer
          - name: creator
            type: string
            description: Filter by creator user ID
      get:
        method: GET
        path: /api/v1/checkins/{id}/
      create:
        method: POST
        path: /api/v1/checkins/
        body:
          - name: message
            type: string
            required: true
            description: Check-in message/status update

  oneonones:
    description: One-on-one meetings between manager and report
    endpoints:
      list:
        method: GET
        path: /api/v1/oneonones/
        params:
          - name: limit
            type: integer
          - name: offset
            type: integer
          - name: status
            type: string
            description: "Filter by status: upcoming, completed"
          - name: target
            type: string
            description: Filter by target user
      get:
        method: GET
        path: /api/v1/oneonones/{id}/

  oneononenotes:
    description: Notes attached to one-on-one meetings
    endpoints:
      list:
        method: GET
        path: /api/v1/oneononenotes/
        params:
          - name: oneonone
            type: string
            description: Filter by 1:1 ID
          - name: limit
            type: integer

  peer_feedback:
    description: Peer feedback requests and responses
    endpoints:
      list:
        method: GET
        path: /api/v1/feedback/
        params:
          - name: limit
            type: integer
          - name: offset
            type: integer

  feedbackrequest:
    description: Feedback requests sent to peers
    endpoints:
      list:
        method: GET
        path: /api/v1/feedbackrequest/
        params:
          - name: limit
            type: integer
      create:
        method: POST
        path: /api/v1/feedbackrequest/
        body:
          - name: provider
            type: string
            description: User URI of feedback provider
          - name: message
            type: string

  recognitionbadges:
    description: Recognition and kudos sent between users
    endpoints:
      list:
        method: GET
        path: /api/v1/recognitionbadges/
        params:
          - name: limit
            type: integer
          - name: offset
            type: integer
          - name: sender
            type: string
          - name: recipient
            type: string
      get:
        method: GET
        path: /api/v1/recognitionbadges/{id}/
      create:
        method: POST
        path: /api/v1/recognitionbadges/
        body:
          - name: recipient
            type: string
            required: true
            description: User URI of recipient
          - name: badge
            type: string
            required: true
            description: Badge URI
          - name: message
            type: string
            required: true
          - name: quiet
            type: boolean
            description: Suppress network post

  badges:
    description: Available badge types for recognition
    endpoints:
      list:
        method: GET
        path: /api/v1/badges/
        no_auth: false

  performancecycles:
    description: Performance review cycles
    endpoints:
      list:
        method: GET
        path: /api/v1/performancecycles/
        params:
          - name: limit
            type: integer
          - name: target
            type: string
      get:
        method: GET
        path: /api/v1/performancecycles/{id}/

  notifications:
    description: User notifications
    endpoints:
      list:
        method: GET
        path: /api/v1/notifications/
        params:
          - name: limit
            type: integer
          - name: offset
            type: integer

  user:
    description: Users in the organization
    endpoints:
      list:
        method: GET
        path: /api/v1/user/
        params:
          - name: limit
            type: integer
          - name: offset
            type: integer
          - name: email
            type: string
          - name: is_active
            type: boolean
      get:
        method: GET
        path: /api/v1/user/{id}/

  userprofile:
    description: Extended user profile with role and manager info
    endpoints:
      list:
        method: GET
        path: /api/v1/userprofile/
        params:
          - name: limit
            type: integer
      get:
        method: GET
        path: /api/v1/userprofile/{id}/

  teamobjectives:
    description: Team-level OKRs
    endpoints:
      list:
        method: GET
        path: /api/v1/teamobjectives/
        params:
          - name: limit
            type: integer
          - name: offset
            type: integer
          - name: closed
            type: boolean
      get:
        method: GET
        path: /api/v1/teamobjectives/{id}/

  organizationalobjectives:
    description: Company-wide OKRs
    endpoints:
      list:
        method: GET
        path: /api/v1/organizationalobjectives/
        params:
          - name: limit
            type: integer
          - name: offset
            type: integer
      get:
        method: GET
        path: /api/v1/organizationalobjectives/{id}/

  team:
    description: Teams in the organization
    endpoints:
      list:
        method: GET
        path: /api/v1/team/
        params:
          - name: limit
            type: integer
      get:
        method: GET
        path: /api/v1/team/{id}/

  categories:
    description: Objective categories for tagging
    endpoints:
      list:
        method: GET
        path: /api/v1/categories/
        no_auth: false
